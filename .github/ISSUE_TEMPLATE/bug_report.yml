name: 🐛 Bug Report
description: Report a bug or unexpected behavior in Arnio
title: "Bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below so we can reproduce and fix it quickly.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what went wrong.
      placeholder: "When I call ar.pipeline(...), it raises a TypeError instead of..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal code or steps to reproduce the issue.
      placeholder: |
        ```python
        import arnio as ar

        frame = ar.read_csv("data.csv")
        result = ar.pipeline(frame, [("strip_whitespace",)])
        # Error occurs here
        ```
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include the full error traceback if applicable.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Arnio version
      description: "Run `python -c \"import arnio; print(arnio.__version__)\"` to find this."
      placeholder: "1.0.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
        - Google Colab
        - Other
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other information that might help (logs, screenshots, related issues).
