name: ✨ Feature Request
description: Suggest a new feature or improvement for Arnio
title: "Feature: "
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make Arnio better? We'd love to hear it!
        If you're interested in implementing this yourself, mention it below — contributions are always welcome.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve? Why is it needed?
      placeholder: "I frequently need to ... but currently Arnio doesn't support ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature or API you'd like to see.
      placeholder: |
        A new pipeline step `remove_outliers` that accepts a column and a threshold:
        ```python
        ar.pipeline(frame, [
            ("remove_outliers", {"column": "price", "std_threshold": 3}),
        ])
        ```
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered other approaches or workarounds?

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: What area of Arnio does this affect?
      options:
        - New pipeline step (Python)
        - New pipeline step (C++)
        - CSV reader / I/O
        - Performance optimization
        - API design
        - Documentation
        - CI / Infrastructure
        - Other
    validations:
      required: true

  - type: dropdown
    id: willing
    attributes:
      label: Would you like to implement this?
      options:
        - "Yes — I'd like to submit a PR"
        - "Maybe — I'd need guidance"
        - "No — just suggesting"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other information, examples, or references.
